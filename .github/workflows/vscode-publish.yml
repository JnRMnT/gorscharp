name: VS Code Extension Publish

on:
  push:
    tags: [ 'vscode-v*' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup .NET (for Language Server build)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Java (for ANTLR)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build Language Server
        run: >
          dotnet publish src/GorSharp.LanguageServer/GorSharp.LanguageServer.csproj
          --configuration Release
          --runtime linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          -o src/GorSharp.VSCode/server

      - name: Install extension dependencies
        working-directory: src/GorSharp.VSCode
        run: npm ci

      - name: Compile extension
        working-directory: src/GorSharp.VSCode
        run: npm run compile

      - name: Package VSIX
        working-directory: src/GorSharp.VSCode
        run: npx @vscode/vsce package

      - name: Publish to Marketplace
        working-directory: src/GorSharp.VSCode
        run: npx @vscode/vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: gorsharp-vscode
          path: src/GorSharp.VSCode/*.vsix

